<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Tickets</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
    <h1>My Tickets</h1>

    <p><a th:href="@{/tickets/new}">Create New Ticket</a></p>

	<div th:if="${#lists.isEmpty(tickets)}">
	    <p>You have not created any tickets yet.</p>
	</div>
	
	<table border="1" th:if="${!#lists.isEmpty(tickets)}">
        <thead>
            <tr>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ticket : ${tickets}">
				<td>
					<a th:href="@{/tickets/{id}(id=${ticket.id})}" th:text="${ticket.title}">Title</a>
				</td>
                <td th:text="${ticket.priority}">Priority</td>
                <td th:text="${ticket.status}">Status</td>
                <td th:text="${ticket.createdAt}">Created At</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
