<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Agent Dashboard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Agent Ticket Dashboard</h1>

<form method="get" th:action="@{/agent/tickets}">
    <label for="status">Status:</label>
    <select id="status" name="status">
        <option value="">All</option>
        <option th:each="statusOption : ${statuses}"
                th:value="${statusOption}"
                th:text="${statusOption}"
                th:selected="${selectedStatus == statusOption}">
        </option>
    </select>

    <label for="priority">Priority:</label>
    <select id="priority" name="priority">
        <option value="">All</option>
        <option th:each="priorityOption : ${priorities}"
                th:value="${priorityOption}"
                th:text="${priorityOption}"
                th:selected="${selectedPriority == priorityOption}">
        </option>
    </select>

    <button type="submit">Filter</button>
    <a th:href="@{/agent/tickets}">Clear Filters</a>
</form>

<hr>

<div th:if="${#lists.isEmpty(tickets)}">
    <p>No tickets found.</p>
</div>

<table border="1" th:if="${!#lists.isEmpty(tickets)}">
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Created By</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created At</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}">1</td>
			<td>
			    <a th:href="@{/agent/tickets/{id}(id=${ticket.id})}"
			       th:text="${ticket.title}">Title</a>
			</td>            
			<td th:text="${ticket.createdBy.displayName}">User</td>
            <td th:text="${ticket.priority}">HIGH</td>
            <td th:text="${ticket.status}">NEW</td>
            <td th:text="${ticket.createdAtFormatted}">date</td>
        </tr>
    </tbody>
</table>

</body>
</html>
