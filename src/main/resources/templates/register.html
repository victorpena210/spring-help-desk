<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <h1>Create Account</h1>

    <div th:if="${errorMessage}">
        <p th:text="${errorMessage}"></p>
    </div>

	<form th:action="@{/register}" th:object="${registerRequest}" method="post">
	    <div>
	        <label>Email:</label>
	        <input type="email" th:field="*{email}" />
	        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
	    </div>

	    <div>
	        <label>Display Name:</label>
	        <input type="text" th:field="*{displayName}" />
	        <p th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></p>
	    </div>

	    <div>
	        <label>Password:</label>
	        <input type="password" th:field="*{password}" />
	        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
	    </div>

	    <div>
	        <label>Confirm Password:</label>
	        <input type="password" th:field="*{confirmPassword}" />
	        <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
	    </div>

	    <button type="submit">Register</button>
	</form>

    <p><a th:href="@{/login}">Already have an account? Log in</a></p>
</body>
</html>
