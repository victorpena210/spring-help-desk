<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ticket Details</title>
    <meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Ticket Details</h1>

    <div th:if="${successMessage}">
        <p th:text="${successMessage}"></p>
    </div>

    <p><strong>ID:</strong> <span th:text="${ticket.id}">1</span></p>
    <p><strong>Title:</strong> <span th:text="${ticket.title}">Ticket Title</span></p>
    <p><strong>Status:</strong> <span th:text="${ticket.status}">NEW</span></p>
    <p><strong>Priority:</strong> <span th:text="${ticket.priority}">LOW</span></p>
    <p><strong>Created At:</strong> <span th:text="${ticket.createdAt}">timestamp</span></p>
    <p><strong>Updated At:</strong> <span th:text="${ticket.updatedAt}">timestamp</span></p>

    <hr>

    <h2>Update Status</h2>

    <form th:action="@{/tickets/{id}/status(id=${ticket.id})}" method="post">
        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="NEW" th:selected="${ticket.status.name() == 'NEW'}">NEW</option>
            <option value="OPEN" th:selected="${ticket.status.name() == 'OPEN'}">OPEN</option>
            <option value="PENDING_CUSTOMER" th:selected="${ticket.status.name() == 'PENDING_CUSTOMER'}">PENDING_CUSTOMER</option>
            <option value="RESOLVED" th:selected="${ticket.status.name() == 'RESOLVED'}">RESOLVED</option>
            <option value="CLOSED" th:selected="${ticket.status.name() == 'CLOSED'}">CLOSED</option>
        </select>

        <button type="submit">Update Status</button>
    </form>

    <hr>

    <h2>Description</h2>
    <p th:text="${ticket.description}">Ticket description goes here.</p>

    <hr>

    <p>
        <a th:href="@{/tickets}">Back to My Tickets</a>
    </p>
</body>
</html>
